version: "3.9"

services:

  backend:
    build: .
    container_name: sentinews_backend

    restart: always

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    volumes:
      - .:/app

  postgres:
    image: postgres:16

    container_name: sentinews_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinews

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: sentinews_redis

    restart: always

    ports:
      - "6379:6379"

volumes:

  postgres_data: